  <text x="92" y="512" font-family="'SF Pro Display', Arial, sans-serif" font-size="27" font-weight="700" fill="#ffffff" fill-opacity="0.5">Each car is a parlay. Its position is the live chance it still cashes, from TxLINE.</text>
